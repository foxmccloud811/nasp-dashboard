<!DOCTYPE html>
<html>
<head>
  <title>NASP Elite Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background:#000; color:white; font-family:Arial; padding:10px; }

    textarea { width:100%; height:120px; margin-bottom:10px; }

    button {
      width:100%; padding:14px; font-size:18px;
      background:#6A0DAD; color:white; border:none;
      border-radius:10px; margin-bottom:10px;
    }

    select { width:100%; padding:10px; margin-bottom:10px; }

    .card {
      background:#111; padding:12px;
      border-radius:12px; margin-bottom:12px;
      box-shadow: 0 0 10px rgba(106,13,173,0.5);
    }

    .big { font-size:32px; font-weight:bold; }

    canvas { background:#111; border-radius:10px; }

    table { width:100%; font-size:14px; }
    td { padding:6px; border-bottom:1px solid #333; }

    .male { color:#4da6ff; }
    .female { color:#ff66cc; }
  </style>
</head>

<body>

<h2>🏹 NASP Elite Dashboard</h2>

<textarea id="input" placeholder="Paste NASP page..."></textarea>
<button onclick="process()">ADD TO SEASON</button>
<button onclick="resetData()">RESET</button>

<select id="archerSelect"></select>

<div class="card">
  <div>PR Score</div>
  <div id="pr" class="big">--</div>
</div>

<div class="card">
  <canvas id="scoreChart"></canvas>
</div>

<div class="card">
  <canvas id="teamChart"></canvas>
</div>

<div class="card">
  <div>Roster</div>
  <table id="roster"></table>
</div>

<div class="card">
  <div>AI Coach Insights</div>
  <div id="insight"></div>
</div>

<script>
let season = JSON.parse(localStorage.getItem("season") || "[]");

function process() {
  const lines = document.getElementById("input").value.split("\n");

  let event = { tournament:"", teamScore:0, archers:{} };

  lines.forEach(line => {

    if (line.includes("Tournament"))
      event.tournament = line.trim();

    if (line.includes("Team Score"))
      event.teamScore = parseInt(line.match(/\d+/)[0]);

    // FIXED parsing (robust)
    if (/^\d{2,3}/.test(line)) {
      let clean = line.replace(/\(T\)/g,"");
      let parts = clean.trim().split(/\s+/);

      let score = parseInt(parts[0]);
      let tens = parseInt(parts[1]);

      // Find gender index (M or F)
      let genderIndex = parts.findIndex(p => p === "M" || p === "F");

      let nameParts = parts.slice(2, genderIndex - 1);
      let name = nameParts.join(" ");

      let gender = parts[genderIndex];

      if (!name || name.length < 3) return;

      event.archers[name] = { score, tens, gender };
    }
  });

  season.push(event);
  localStorage.setItem("season", JSON.stringify(season));

  buildUI();
}

function resetData() {
  localStorage.clear();
  location.reload();
}

function buildUI() {
  let all = new Set();

  season.forEach(e => {
    Object.keys(e.archers).forEach(a => all.add(a));
  });

  let select = document.getElementById("archerSelect");
  select.innerHTML = "";

  all.forEach(a => {
    let opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    select.appendChild(opt);
  });

  select.onchange = updateView;

  buildRoster();
  buildTeamChart();
  updateView();
}

function updateView() {
  let name = document.getElementById("archerSelect").value;

  let scores = [];
  let tens = [];
  let labels = [];

  season.forEach(e => {
    if (e.archers[name]) {
      scores.push(e.archers[name].score);
      tens.push(e.archers[name].tens);
      labels.push(e.tournament.substring(0,20));
    }
  });

  if (!scores.length) return;

  document.getElementById("pr").textContent = Math.max(...scores);

  buildScoreChart(labels, scores, tens);
  buildInsights(name, scores);
}

function buildScoreChart(labels, scores, tens) {
  if (window.scoreChart) window.scoreChart.destroy();

  window.scoreChart = new Chart(document.getElementById("scoreChart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          type: 'line',
          label: 'Score',
          data: scores,
          borderWidth: 3
        },
        {
          type: 'bar',
          label: '10s',
          data: tens
        }
      ]
    }
  });
}

function buildTeamChart() {
  if (window.teamChart) window.teamChart.destroy();

  let labels = season.map(e => e.tournament.substring(0,15));
  let scores = season.map(e => e.teamScore);

  window.teamChart = new Chart(document.getElementById("teamChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: "Team Score",
        data: scores,
        borderWidth: 3
      }]
    }
  });
}

function buildRoster() {
  let table = document.getElementById("roster");
  table.innerHTML = "";

  let stats = {};

  season.forEach(e => {
    Object.entries(e.archers).forEach(([name, obj]) => {
      if (!stats[name]) stats[name] = [];
      stats[name].push(obj);
    });
  });

  let rows = Object.entries(stats).map(([name, arr]) => {
    let avg = arr.reduce((a,b)=>a+b.score,0)/arr.length;
    let gender = arr[0].gender;
    return {name, avg, gender};
  });

  rows.sort((a,b)=>b.avg-a.avg);

  rows.forEach(r => {
    let tr = document.createElement("tr");
    tr.innerHTML = `<td class="${r.gender==='M'?'male':'female'}">${r.name}</td>
                    <td>${r.avg.toFixed(1)}</td>`;
    table.appendChild(tr);
  });
}

function buildInsights(name, scores) {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  let text = "";

  if (avg > 260) text += "🔥 State-level<br>";
  else if (avg > 240) text += "💪 Varsity<br>";

  if (scores.length >= 2) {
    let diff = scores[scores.length-1] - scores[scores.length-2];
    if (diff >= 15) text += "🚀 Big improvement<br>";
    if (diff <= -20) text += "⚠️ Major drop<br>";
  }

  document.getElementById("insight").innerHTML = text;
}

buildUI();
</script>

</body>
</html>
