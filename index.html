<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:white;font-family:Arial;margin:0;}
.container{padding:12px;max-width:1100px;margin:auto;}
.card{background:#111;padding:14px;margin-bottom:14px;border-radius:12px;}
h3{margin:0 0 10px 0;}

textarea{width:100%;height:110px;margin-bottom:8px;}
input,select{
width:100%;padding:8px;margin-bottom:8px;
background:#000;color:white;border:1px solid #333;
}

button{
width:100%;padding:12px;margin-bottom:10px;
background:#6A0DAD;color:white;border:none;border-radius:8px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}
@media(min-width:800px){
.grid{grid-template-columns:1fr 1fr;}
}

table{width:100%;border-collapse:collapse;}
th,td{padding:8px;border-bottom:1px solid #333;text-align:left;}
th{position:sticky;top:0;background:#111;}

.male{color:#4da6ff;}
.female{color:#ff66cc;}
</style>
</head>

<body>

<div class="container">

<h2>🏹 NASP Elite Dashboard</h2>

<div class="card" id="loginCard">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Coach Login</button>
</div>

<div class="card" id="adminPanel" style="display:none;">
<textarea id="input" placeholder="Paste NASP page"></textarea>

<label>Tournament Date</label>
<input type="date" id="eventDate">

<button onclick="process()">ADD TO SEASON</button>
<button onclick="resetData()">RESET</button>
</div>

<div class="grid">

<div class="card">
<h3>Archer</h3>
<select id="archer"></select>
<canvas id="archerChart"></canvas>
</div>

<div class="card">
<h3>Team</h3>
<select id="tournament"></select>
<div id="teamStats"></div>
<canvas id="teamChart"></canvas>
</div>

</div>

<div class="card" id="dateEditor" style="display:none;">
<h3>Edit Tournament Dates</h3>
<div id="dateList"></div>
</div>

<div class="card">
<h3>Roster</h3>
<table id="roster"></table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let season=[];

function isCoach(user){
return user && user.email==="william@sheppardfamily.net";
}

window.login=function(){
signInWithEmailAndPassword(auth,email.value,password.value)
.catch(()=>alert("Login failed"));
}

onAuthStateChanged(auth,user=>{
if(isCoach(user)){
loginCard.style.display="none";
adminPanel.style.display="block";
dateEditor.style.display="block";
}else{
adminPanel.style.display="none";
dateEditor.style.display="none";
}
loadData();
});

async function process(){

let lines=input.value.split("\n");

let e={
tournament:lines[0]||"Event",
date: eventDate.value || new Date().toISOString(),
teamScore:0,
teamTens:0,
archers:{}
};

lines.forEach(l=>{

if(l.includes("Team Score")){
e.teamScore=parseInt(l.match(/\d+/)[0]);
let t=l.match(/\((\d+)\)/);
e.teamTens=t?+t[1]:0;
}

if(/^\d{2,3}/.test(l)){
let p=l.replace("(T)","").split(/\s+/);
let gi=p.findIndex(x=>x=="M"||x=="F");

if(gi<3) return;

let name=p.slice(2,gi-1).join(" ").trim();
if(!name) return;

let score=parseInt(p[0]);
if(isNaN(score)) return;

let tens=parseInt(p[1])||0;
let gender=p[gi];

e.archers[name]={score,tens,gender};
}

});

// 🚨 PREVENT FIREBASE ERROR
if(Object.keys(e.archers).length===0){
alert("No valid archers found — check paste");
return;
}

await addDoc(collection(db,"season"),e);

// 🔥 AUTO-CLEAR INPUTS (SAFE)
if (typeof input !== "undefined") input.value = "";
if (typeof eventDate !== "undefined") eventDate.value = "";

loadData();
}

async function resetData(){
let s=await getDocs(collection(db,"season"));
for(let d of s.docs){
await deleteDoc(doc(db,"season",d.id));
}
loadData();
}

async function loadData(){
season=[];
let snap=await getDocs(collection(db,"season"));

snap.forEach(d=>{
let data=d.data();
data.id=d.id;
season.push(data);
});

// 🔥 SORT BY DATE
season.sort((a,b)=> new Date(a.date)-new Date(b.date));

build();
buildDateEditor();
}

function build(){

let archers=[...new Set(season.flatMap(e=>Object.keys(e.archers)))].sort();
archer.innerHTML=archers.map(a=>`<option>${a}</option>`).join("");

tournament.innerHTML=season.map((e,i)=>
`<option value="${i}">${e.tournament}</option>`
).join("");

archer.onchange=update;
tournament.onchange=update;

update();
buildRoster();
}

function update(){

let name=archer.value;
if(!name) return;

let scores=[],tens=[],labels=[];

season.forEach(e=>{
if(e.archers[name]){
scores.push(e.archers[name].score);
tens.push(e.archers[name].tens);
labels.push(e.tournament);
}
});

if(!scores.length) return;

drawArcherChart(labels,scores,tens);

let e=season[tournament.value];
if(e){
teamStats.innerHTML=`Score ${e.teamScore} | 10s ${e.teamTens}`;
}

drawTeamChart();
}

function drawArcherChart(labels,scores,tens){

if(window.aChart)aChart.destroy();

aChart=new Chart(archerChart,{
data:{
labels,
datasets:[
{
type:'line',
label:'Score',
data:scores,
borderWidth:3
},
{
type:'bar',
label:'10s',
data:tens,
backgroundColor:'white'
}
]
}
});
}

function drawTeamChart(){

if(window.tChart)tChart.destroy();

tChart=new Chart(teamChart,{
type:'line',
data:{
labels:season.map(e=>e.tournament),
datasets:[{
label:'Team Score',
data:season.map(e=>e.teamScore),
borderWidth:3
}]
}
});
}

function buildRoster(){

let stats={};

season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o);
});
});

let rows=Object.entries(stats).map(([n,a])=>{
let scores=a.map(x=>x.score);
let avg=Math.round(scores.reduce((x,y)=>x+y)/scores.length);
let pr=Math.max(...scores);
let tens=a.reduce((x,y)=>x+y.tens,0);

return {n,avg,pr,tens,gender:a[0].gender};
}).sort((a,b)=>b.avg-a.avg);

roster.innerHTML=`
<tr><th>Name</th><th>Avg</th><th>PR</th><th>10s</th></tr>
`+rows.map(r=>`
<tr>
<td class="${r.gender=='M'?'male':'female'}">${r.n}</td>
<td>${r.avg}</td>
<td>${r.pr}</td>
<td>${r.tens}</td>
</tr>`).join("");
}

function buildDateEditor(){

dateList.innerHTML="";

season.forEach(e=>{
dateList.innerHTML+=`
<div style="margin-bottom:8px;">
${e.tournament}
<input type="date" value="${e.date?.slice(0,10)||''}"
onchange="updateDate('${e.id}',this.value)">
</div>
`;
});
}

window.updateDate=async(id,date)=>{
await updateDoc(doc(db,"season",id),{date});
loadData();
};

</script>

</body>
</html>
