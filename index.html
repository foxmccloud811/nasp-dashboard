<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;margin:0}
.tab{display:flex}
.tab button{flex:1;padding:12px;background:#111;color:white;border:none}
.active{background:#6A0DAD}
.section{display:none;padding:10px}
.show{display:block}
.card{background:#111;padding:10px;margin:10px;border-radius:10px}
.male{color:#4da6ff}
.female{color:#ff66cc}
table{width:100%} td{padding:6px;border-bottom:1px solid #333}
</style>
</head>

<body>

<div class="tab">
<button onclick="openTab(0)">Dashboard</button>
<button onclick="openTab(1)">Roster</button>
<button onclick="openTab(2)">Team</button>
<button onclick="openTab(3)">Insights</button>
</div>

<div class="section show" id="tab0">

<textarea id="input"></textarea>
<button onclick="process()">ADD</button>
<button onclick="resetData()">RESET</button>

<select id="archer"></select>

<div class="card">PR: <span id="pr"></span></div>
<div class="card">Avg: <span id="avg"></span></div>
<div class="card">Prediction: <span id="predict"></span></div>

<canvas id="chart"></canvas>

</div>

<div class="section" id="tab1">
<div class="card"><table id="roster"></table></div>
</div>

<div class="section" id="tab2">
<div class="card"><canvas id="teamChart"></canvas></div>
<div class="card" id="teamStats"></div>
</div>

<div class="section" id="tab3">
<div class="card" id="insight"></div>
<div class="card" id="top12"></div>
<div class="card" id="improved"></div>
</div>

<script>
let season=JSON.parse(localStorage.getItem("season")||"[]");

function openTab(i){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.getElementById("tab"+i).classList.add("show");
}

function process(){
let lines=input.value.split("\n");
let e={tournament:lines[0],teamScore:0,archers:{}};

lines.forEach(l=>{
if(l.includes("Team Score")) e.teamScore=parseInt(l.match(/\d+/)[0]);

if(/^\d{2,3}/.test(l)){
let p=l.replace("(T)","").split(/\s+/);
let gi=p.findIndex(x=>x=="M"||x=="F");
let name=p.slice(2,gi-1).join(" ");
e.archers[name]={score:+p[0],tens:+p[1],gender:p[gi]};
}
});

season.push(e);
localStorage.setItem("season",JSON.stringify(season));
build();
}

function resetData(){localStorage.clear();location.reload();}

function build(){
let archers=[...new Set(season.flatMap(e=>Object.keys(e.archers)))];
archer.innerHTML=archers.map(a=>`<option>${a}</option>`).join("");

buildRoster();
buildTeam();
buildInsights();
update();
}

function update(){
let name=archer.value;
let scores=[],labels=[];

season.forEach(e=>{
if(e.archers[name]){
scores.push(e.archers[name].score);
labels.push(e.tournament);
}
});

if(!scores.length)return;

pr.innerText=Math.max(...scores);
avg.innerText=(scores.reduce((a,b)=>a+b)/scores.length).toFixed(1);

// prediction
let trend=scores.length>1 ? scores.at(-1)-scores.at(-2):0;
predict.innerText=Math.round(scores.at(-1)+trend);

if(window.c)c.destroy();
c=new Chart(chart,{type:'line',data:{labels,datasets:[{data:scores}]}})
}

function buildRoster(){
let stats={};

season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o.score);
});
});

let rows=Object.entries(stats).map(([n,s])=>{
let avg=s.reduce((a,b)=>a+b)/s.length;
let pr=Math.max(...s);
let variance=s.reduce((a,b)=>a+(b-avg)**2,0)/s.length;

return {n,avg,pr,consistency:(100-variance).toFixed(0)};
}).sort((a,b)=>b.avg-a.avg);

roster.innerHTML=rows.map(r=>`
<tr><td>${r.n}</td><td>${r.avg.toFixed(1)}</td><td>${r.pr}</td><td>${r.consistency}</td></tr>`).join("");
}

function buildTeam(){
let labels=season.map(e=>e.tournament);
let scores=season.map(e=>e.teamScore);

if(window.tc)tc.destroy();
tc=new Chart(teamChart,{type:'line',data:{labels,datasets:[{data:scores}]}});

teamStats.innerHTML=`
PR: ${Math.max(...scores)}<br>
Avg: ${(scores.reduce((a,b)=>a+b)/scores.length).toFixed(1)}
`;
}

function buildInsights(){
let stats={};

season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o.score);
});
});

// top12
let top=Object.entries(stats).map(([n,s])=>({
n,avg:s.reduce((a,b)=>a+b)/s.length
})).sort((a,b)=>b.avg-a.avg).slice(0,12);

top12.innerHTML="Top 12:<br>"+top.map(t=>t.n).join("<br>");

// improved
let imp=Object.entries(stats).map(([n,s])=>{
let diff=s.length>1 ? s.at(-1)-s.at(-2):0;
return {n,diff};
}).sort((a,b)=>b.diff-a.diff).slice(0,5);

improved.innerHTML="Most Improved:<br>"+imp.map(i=>`${i.n} (+${i.diff})`).join("<br>");
}

build();
</script>

</body>
</html>
