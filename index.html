<script>
let season = JSON.parse(localStorage.getItem("season") || "[]");

function process(){
  let lines = input.value.split("\n");
  let e = { tournament: lines.find(l=>l.trim()) || "Event", teamScore:0, archers:{} };

  lines.forEach(l=>{
    if(l.includes("Team Score")) e.teamScore = parseInt(l.match(/\d+/)[0]);

    if(/^\d{2,3}/.test(l)){
      let p = l.replace("(T)","").trim().split(/\s+/);
      let gi = p.findIndex(x=>x=="M"||x=="F");

      if(gi === -1) return;

      let name = p.slice(2, gi-1).join(" ");
      let score = +p[0];
      let tens = +p[1];
      let gender = p[gi];

      if(name.length < 3) return;

      e.archers[name] = {score, tens, gender};
    }
  });

  season.push(e);
  localStorage.setItem("season", JSON.stringify(season));
  build();
}

function resetData(){
  localStorage.clear();
  location.reload();
}

function build(){
  let archers = [...new Set(season.flatMap(e=>Object.keys(e.archers)))];

  archer.innerHTML = archers.map(a=>`<option>${a}</option>`).join("");
  tournament.innerHTML = season.map((e,i)=>`<option value="${i}">${e.tournament}</option>`).join("");

  archer.onchange = update;
  tournament.onchange = ()=>{
    update();
    buildRoster();
  };

  buildRoster();
  drawTeamChart();
  update();
}

function update(){
  let name = archer.value;

  let scores=[], tens=[], labels=[];

  season.forEach(e=>{
    if(e.archers[name]){
      scores.push(e.archers[name].score);
      tens.push(e.archers[name].tens);
      labels.push(e.tournament);
    }
  });

  if(!scores.length) return;

  pr.innerText = Math.max(...scores);
  avg.innerText = Math.round(scores.reduce((a,b)=>a+b)/scores.length);
  let totalTens = tens.reduce((a,b)=>a+b,0);
document.getElementById("tens").innerText = totalTens;

  let trend = scores.length>1 ? scores.at(-1)-scores.at(-2):0;
  predict.innerText = Math.round(scores.at(-1)+trend);

  drawArcherChart(labels, scores, tens);
  drawTeamStats();
  drawInsights(name, scores);
}

function drawArcherChart(labels, scores, tens){
  if(window.aChart) aChart.destroy();

  aChart = new Chart(archerChart,{
    data:{
      labels,
      datasets:[
        {
          type:'line',
          label:'Score',
          data:scores,
          borderWidth:3,
          yAxisID:'y'
        },
        {
          type:'bar',
          label:'10s',
          data:tens,
          yAxisID:'y1'
        }
      ]
    },
    options:{
      scales:{
        y:{position:'left'},
        y1:{position:'right', grid:{drawOnChartArea:false}}
      }
    }
  });
}

function drawTeamChart(){
  if(window.tChart) tChart.destroy();

  let labels = season.map(e=>e.tournament);
  let scores = season.map(e=>e.teamScore);

  tChart = new Chart(teamChart,{
    type:'line',
    data:{labels, datasets:[{label:'Team Score', data:scores}]}
  });
}

function drawTeamStats(){
  let e = season[tournament.value];

  if(!e) return;

  let avgScore = Math.round(
    Object.values(e.archers).reduce((a,b)=>a+b.score,0) /
    Object.keys(e.archers).length
  );

  teamStats.innerHTML = `
    Score: ${e.teamScore}<br>
    Average: ${avgScore}
  `;
}

function buildRoster(){
  let stats = {};
  let selected = season[tournament.value];

  season.forEach(e=>{
    Object.entries(e.archers).forEach(([n,o])=>{
      if(!stats[n]) stats[n]=[];
      stats[n].push(o);
    });
  });

  let rows = Object.entries(stats).map(([n,a])=>{
    let scores = a.map(x=>x.score);
    let avg = Math.round(scores.reduce((x,y)=>x+y)/scores.length);
    let pr = Math.max(...scores);
    let tens = a.reduce((x,y)=>x+y.tens,0);

    let variance = scores.reduce((x,y)=>x+(y-avg)**2,0)/scores.length;

    let tournamentScore = selected?.archers[n]?.score || "-";

    return {
      n, avg, pr, tens,
      consistency: Math.round(100-variance),
      gender:a[0].gender,
      tournamentScore
    };
  }).sort((a,b)=>b.avg-a.avg);

  roster.innerHTML = `
  <tr>
    <th>Name</th><th>Avg</th><th>PR</th><th>10s</th>
    <th>Consistency</th><th>Tournament</th>
  </tr>
  ` + rows.map(r=>`
  <tr>
    <td class="${r.gender=='M'?'male':'female'}">${r.n}</td>
    <td>${r.avg}</td>
    <td>${r.pr}</td>
    <td>${r.tens}</td>
    <td>${r.consistency}</td>
    <td>${r.tournamentScore}</td>
  </tr>`).join("");
}

function drawInsights(name,scores){
  let avgScore = Math.round(scores.reduce((a,b)=>a+b)/scores.length);
  let txt = "";

  if(avgScore>260) txt+="🔥 State Level<br>";
  else if(avgScore>240) txt+="💪 Strong Varsity<br>";

  if(scores.length>1){
    let diff = scores.at(-1)-scores.at(-2);
    if(diff>15) txt+="🚀 Big Improvement<br>";
    if(diff<-20) txt+="⚠️ Major Drop<br>";
  }

  insight.innerHTML = txt;
}

build();
