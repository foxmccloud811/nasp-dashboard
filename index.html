<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
background:#000;
color:white;
font-family:Arial;
margin:0;
}

/* 🔥 FULL LOGO (VISIBLE) */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://raw.githubusercontent.com/foxmccloud811/nasp-dashboard/main/Cchieftain.jpeg');
background-size:cover;
background-position:center;
opacity:1; /* 🔥 FULL */
z-index:0;
pointer-events:none;
}

/* 🔥 GLASS CARDS */
.card{
background:rgba(0,0,0,0.15); /* 🔥 15% */
backdrop-filter:blur(10px);
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

.container{
position:relative;
z-index:1;
padding:12px;
max-width:1100px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

@media(min-width:800px){
.grid{grid-template-columns:1fr 1fr;}
}

button{
padding:8px;
background:#6A0DAD;
color:white;
border:none;
border-radius:8px;
}

textarea{width:100%;height:100px;}

.male{color:#4da6ff;}
.female{color:#ff66cc;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
cursor:pointer;
}

th{
position:sticky;
top:0;
}
</style>
</head>

<body>
<div class="container">

<div class="topbar">
<h2>🏹 Logan Hocking Archery</h2>
<div>
<select id="teamSelect"></select>
<button id="addTeamBtn" onclick="createTeam()" style="display:none;">+ Team</button>
</div>
</div>

<div id="loginCard" class="card">
<input id="email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">
<div class="card">
<textarea id="input"></textarea>
<input type="date" id="eventDate">
<button onclick="process()">ADD TO SEASON</button>
<button onclick="resetSeason()">RESET</button>

<h4>Edit Dates</h4>
<div id="dateList"></div>
</div>
</div>

<div class="grid">

<div class="card">
<h3>Archer</h3>
<select id="archer"></select>
<canvas id="archerChart"></canvas>
</div>

<div class="card">
<h3>Team</h3>
<select id="tournament"></select>
<div id="teamStats"></div>
<canvas id="teamChart"></canvas>
</div>

</div>

<div class="card">
<h3>Roster</h3>
<table id="roster"></table>
</div>

</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyDLWNHjzpzHr58sEX-hDxetQhWygTabXFs",
authDomain:"nasp-dashboard.firebaseapp.com",
projectId:"nasp-dashboard"
});

const db=firebase.firestore();
const auth=firebase.auth();

let season=[],currentTeam="",sortKey="avg",sortDir=-1;

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>alert("Login failed"));
}

auth.onAuthStateChanged(user=>{
if(user){
loginCard.style.display="none";
adminPanel.style.display="block";
addTeamBtn.style.display="inline-block";
}
loadTeams();
});

function loadTeams(){
db.collection("teams").get().then(s=>{
let teams=[];
s.forEach(d=>{
if(d.id!=="default") teams.push(d.id);
});
currentTeam=teams[0];

teamSelect.innerHTML=teams.map(t=>`<option>${t}</option>`).join("");

teamSelect.onchange=()=>{
currentTeam=teamSelect.value;
loadData();
};

loadData();
});
}

function createTeam(){
let name=prompt("Team name?");
if(!name)return;
db.collection("teams").doc(name).set({}).then(loadTeams);
}

function process(){
let lines=input.value.split("\n");

let e={
tournament:lines[0]||"Event",
date:eventDate.value||Date.now(),
teamScore:0,
teamTens:0,
archers:{}
};

lines.forEach(l=>{
if(l.includes("Team Score")){
e.teamScore=parseInt(l.match(/\d+/)[0]);
let t=l.match(/\((\d+)\)/);
e.teamTens=t?+t[1]:0;
}

if(/^\d{2,3}/.test(l)){
let p=l.replace("(T)","").split(/\s+/);
let gi=p.findIndex(x=>x=="M"||x=="F");
if(gi<3)return;

let name=p.slice(2,gi-1).join(" ").trim();
let score=parseInt(p[0]);
let tens=parseInt(p[1])||0;
let gender=p[gi];

if(name && !isNaN(score)){
e.archers[name]={score,tens,gender};
}
}
});

db.collection("teams").doc(currentTeam).collection("season").add(e).then(()=>{
input.value="";
eventDate.value="";
loadData();
});
}

function loadData(){
db.collection("teams").doc(currentTeam).collection("season").get().then(s=>{
season=[];
s.forEach(d=>season.push({...d.data(),id:d.id}));
season.sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
build();
buildDateEditor();
});
}

function build(){

let archers=[...new Set(season.flatMap(e=>Object.keys(e.archers)))].sort();

archer.innerHTML=archers.map(a=>`<option>${a}</option>`).join("");
tournament.innerHTML=season.map((e,i)=>`<option value="${i}">${e.tournament}</option>`).join("");

if(archers.length) archer.value=archers[0];
if(season.length) tournament.value=0;

archer.onchange=update;
tournament.onchange=()=>{
update();
buildRoster();
};

update();
drawTeamChart();
buildRoster();
}

function update(){

let name=archer.value;
if(!name)return;

let scores=[],tens=[],labels=[];

season.forEach(e=>{
if(e.archers[name]){
scores.push(e.archers[name].score);
tens.push(e.archers[name].tens);
labels.push(e.tournament);
}
});

let pr=Math.max(...scores);

if(window.aChart)aChart.destroy();

aChart=new Chart(archerChart,{
data:{
labels,
datasets:[
{
type:'line',
label:'Score',
data:scores,
borderColor:'#6A0DAD',
pointBackgroundColor:scores.map(s=>s===pr?'gold':'#6A0DAD'),
pointRadius:scores.map(s=>s===pr?8:3)
},
{
type:'bar',
label:'10s',
data:tens,
backgroundColor:'white',
yAxisID:'y1'
}
]
},
options:{
scales:{
y:{
beginAtZero:false
},
y1:{
position:'right',
beginAtZero:true,
ticks:{
stepSize:1,
callback:(v)=>Number.isInteger(v)?v:null
}
}
}
}
});

let e=season[tournament.value];
teamStats.innerHTML=e?`Score ${e.teamScore} | 10s ${e.teamTens}`:"";
}

function drawTeamChart(){
if(window.tChart)tChart.destroy();

tChart=new Chart(teamChart,{
type:'line',
data:{
labels:season.map(e=>e.tournament),
datasets:[{
label:'Team Score',
data:season.map(e=>e.teamScore),
borderColor:'#6A0DAD'
}]
}
});
}

function buildRoster(){

let sel=season[tournament.value];

let stats={},tensMap={},genderMap={};

season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o.score);

if(!tensMap[n])tensMap[n]=0;
tensMap[n]+=o.tens||0;

if(!genderMap[n])genderMap[n]=o.gender;
});
});

let rows=Object.entries(stats).map(([n,s])=>{
let avg=Math.round(s.reduce((a,b)=>a+b)/s.length);
let pr=Math.max(...s);
let cur=sel?.archers[n]?.score||"-";
let tens=tensMap[n];

let variance=s.reduce((a,b)=>a+(b-avg)**2,0)/s.length;
let cons=Math.min(10,Math.round(variance/50));

return {n,avg,pr,cur,tens,cons,gender:genderMap[n]};
});

rows.sort((a,b)=>(b[sortKey]-a[sortKey])*sortDir);

roster.innerHTML=`
<tr>
<th onclick="setSort('n')">Name</th>
<th>${sel?.tournament||'Score'}</th>
<th onclick="setSort('avg')">Avg</th>
<th onclick="setSort('pr')">PR</th>
<th onclick="setSort('tens')">10s</th>
<th onclick="setSort('cons')">Consistency</th>
</tr>
`;

rows.forEach(r=>{
roster.innerHTML+=`
<tr>
<td class="${r.gender==='M'?'male':'female'}">${r.n}</td>
<td>${r.cur}</td>
<td>${r.avg}</td>
<td>${r.pr}</td>
<td>${r.tens}</td>
<td>${r.cons}</td>
</tr>`;
});
}

function setSort(k){
sortKey=k;
sortDir*=-1;
buildRoster();
}

function buildDateEditor(){
dateList.innerHTML="";
season.forEach(e=>{
dateList.innerHTML+=`
<div>
${e.tournament}
<input type="date" value="${e.date?.slice(0,10)||''}"
onchange="updateDate('${e.id}',this.value)">
</div>`;
});
}

window.updateDate=function(id,date){
db.collection("teams").doc(currentTeam)
.collection("season").doc(id)
.update({date}).then(loadData);
}

function resetSeason(){
if(!confirm("Delete all data?"))return;

db.collection("teams").doc(currentTeam).collection("season").get()
.then(s=>{
let batch=db.batch();
s.forEach(d=>batch.delete(d.ref));
return batch.commit();
}).then(loadData);
}

loadTeams();

</script>
</body>
</html>
