<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:#000;color:white;font-family:Arial;padding:10px;}
textarea{width:100%;height:120px;}
button{width:100%;padding:12px;margin:5px 0;background:#6A0DAD;color:white;border:none;border-radius:8px;}
select{width:100%;padding:8px;margin:5px 0;}
.card{background:#111;padding:10px;border-radius:10px;margin:10px 0;}
.male{color:#4da6ff;}
.female{color:#ff66cc;}
table{width:100%;}
td{padding:5px;border-bottom:1px solid #333;}
.big{font-size:28px;font-weight:bold;}
</style>
</head>

<body>

<h2>🏹 NASP ELITE</h2>

<textarea id="input"></textarea>
<button onclick="process()">ADD TO SEASON</button>
<button onclick="resetData()">RESET</button>

<select id="tournamentSelect"></select>
<select id="archerSelect"></select>

<div class="card">
<div>PR</div>
<div id="pr" class="big"></div>
<div>Average: <span id="avg"></span></div>
<div>10s: <span id="tens"></span></div>
</div>

<div class="card"><canvas id="chart"></canvas></div>
<div class="card"><canvas id="teamChart"></canvas></div>

<div class="card">
<div>Team Stats</div>
<div id="teamStats"></div>
</div>

<div class="card">
<div>Roster</div>
<table id="roster"></table>
</div>

<div class="card">
<div>AI Coach</div>
<div id="insight"></div>
</div>

<script>
let season = JSON.parse(localStorage.getItem("season")||"[]");

function process(){
let lines=input.value.split("\n");
let event={tournament:"",teamScore:0,archers:{}};

// tournament = first line
event.tournament=lines.find(l=>l.trim().length>5)||"Event";

lines.forEach(line=>{
if(line.includes("Team Score")) event.teamScore=parseInt(line.match(/\d+/)[0]);

if(/^\d{2,3}/.test(line)){
let clean=line.replace("(T)","");
let p=clean.trim().split(/\s+/);

let score=parseInt(p[0]);
let tens=parseInt(p[1]);

let gi=p.findIndex(x=>x=="M"||x=="F");
let name=p.slice(2,gi-1).join(" ");
let gender=p[gi];

event.archers[name]={score,tens,gender};
}
});

season.push(event);
localStorage.setItem("season",JSON.stringify(season));
build();
}

function resetData(){localStorage.clear();location.reload();}

function build(){
let archers=new Set();
season.forEach(e=>Object.keys(e.archers).forEach(a=>archers.add(a)));

tournamentSelect.innerHTML=season.map((e,i)=>`<option value="${i}">${e.tournament}</option>`).join("");

archerSelect.innerHTML=[...archers].map(a=>`<option>${a}</option>`).join("");

tournamentSelect.onchange=update;
archerSelect.onchange=update;

buildRoster();
buildTeamChart();
update();
}

function update(){
let name=archerSelect.value;

let scores=[],tens=[],labels=[];

season.forEach(e=>{
if(e.archers[name]){
scores.push(e.archers[name].score);
tens.push(e.archers[name].tens);
labels.push(e.tournament);
}
});

if(!scores.length)return;

pr.innerText=Math.max(...scores);
avg.innerText=(scores.reduce((a,b)=>a+b)/scores.length).toFixed(1);
tens.innerText=tens.reduce((a,b)=>a+b,0);

buildChart(labels,scores,tens);
buildInsights(name,scores);
buildTeamStats();
}

function buildChart(labels,scores,tens){
if(window.c) c.destroy();
c=new Chart(chart,{
data:{
labels,
datasets:[
{type:'line',label:'Score',data:scores,borderWidth:3},
{type:'bar',label:'10s',data:tens}
]}});
}

function buildTeamChart(){
if(window.tc) tc.destroy();
let labels=season.map(e=>e.tournament);
let scores=season.map(e=>e.teamScore);

tc=new Chart(teamChart,{
type:'line',
data:{labels,datasets:[{label:'Team',data:scores,borderWidth:3}]}
});
}

function buildRoster(){
let stats={};

season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o);
});
});

let rows=Object.entries(stats).map(([n,a])=>{
return{
name:n,
avg:a.reduce((x,y)=>x+y.score,0)/a.length,
pr:Math.max(...a.map(x=>x.score)),
tens:a.reduce((x,y)=>x+y.tens,0),
gender:a[0].gender
};
}).sort((a,b)=>b.avg-a.avg);

roster.innerHTML=rows.map(r=>
`<tr>
<td class="${r.gender=='M'?'male':'female'}">${r.name}</td>
<td>${r.avg.toFixed(1)}</td>
<td>${r.pr}</td>
<td>${r.tens}</td>
</tr>`).join("");
}

function buildTeamStats(){
let last=season[season.length-1];
let avg=(Object.values(last.archers).reduce((a,b)=>a+b.score,0)/Object.keys(last.archers).length).toFixed(1);

teamStats.innerHTML=`
Score: ${last.teamScore}<br>
Avg: ${avg}<br>
PR: ${Math.max(...season.map(e=>e.teamScore))}
`;
}

function buildInsights(name,scores){
let text="";
let avg=scores.reduce((a,b)=>a+b)/scores.length;

if(avg>260) text+="🔥 Elite<br>";
if(scores.length>=2){
let d=scores.at(-1)-scores.at(-2);
if(d>15) text+="🚀 Big jump<br>";
if(d<-20) text+="⚠️ Drop<br>";
}

insight.innerHTML=text;
}

build();
</script>

</body>
</html>
