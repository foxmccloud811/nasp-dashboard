<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#0a0a0a;color:white;font-family:Arial;margin:0;}
.container{padding:12px; max-width:900px; margin:auto;}
textarea{width:100%;height:100px;margin-bottom:10px;}
button{width:100%;padding:12px;margin-bottom:10px;background:#6A0DAD;color:white;border:none;border-radius:8px;}
.card{background:#111;padding:12px;margin-bottom:12px;border-radius:12px;}
h3{margin:0 0 8px 0;}
select{width:100%;padding:8px;margin-bottom:10px;background:#000;color:white;border:1px solid #333;}
table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid #333;text-align:left;}
.male{color:#4da6ff;}
.female{color:#ff66cc;}
.big{font-size:26px;font-weight:bold;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:700px){.grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

<body>

<div class="container">

<h2>🏹 NASP Elite Dashboard</h2>

<textarea id="input" placeholder="Paste NASP page here"></textarea>
<button onclick="process()">ADD TO SEASON</button>
<button onclick="resetData()">RESET SEASON</button>

<div class="grid">

<div class="card">
<h3>Archer Performance</h3>

<select id="archer"></select>

<div class="big">PR: <span id="pr"></span></div>
<div>Average: <span id="avg"></span></div>
<div>Total 10s: <span id="tens"></span></div>

<canvas id="archerChart"></canvas>
</div>

<div class="card">
<h3>Team Performance</h3>

<select id="tournament"></select>
<div id="teamStats"></div>

<canvas id="teamChart"></canvas>
</div>

</div>

<div class="card">
<h3>Roster</h3>
<table id="roster"></table>
</div>

<div class="card">
<h3>AI Coach Insights</h3>
<div id="insight"></div>
</div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDLWNHjzpzHr58sEX-hDxetQhWygTabXFs",
  authDomain: "nasp-dashboard.firebaseapp.com",
  projectId: "nasp-dashboard"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let season = [];

// 🟣 PROCESS INPUT
function process(){
  let lines = input.value.split("\n");

  let e = {
    tournament: lines.find(l=>l.trim()) || "Event",
    teamScore:0,
    archers:{}
  };

  lines.forEach(l=>{
    if(l.includes("Team Score")){
      e.teamScore = parseInt(l.match(/\d+/)[0]);
    }

    if(/^\d{2,3}/.test(l)){
      let p = l.replace("(T)","").trim().split(/\s+/);
      let gi = p.findIndex(x=>x=="M"||x=="F");
      if(gi === -1) return;

      let name = p.slice(2, gi-1).join(" ");
      let score = +p[0];
      let tens = +p[1];
      let gender = p[gi];

      e.archers[name] = {score, tens, gender};
    }
  });

  db.collection("season").add(e).then(()=>loadData());
}

// 🔥 LOAD FROM FIREBASE
function loadData(){
  db.collection("season").get().then(snapshot=>{
    season = [];
    snapshot.forEach(doc=>season.push(doc.data()));
    build();
  });
}

// 🔥 RESET DATABASE
function resetData(){
  if(!confirm("Delete ALL data?")) return;

  db.collection("season").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      db.collection("season").doc(doc.id).delete();
    });
    season = [];
    build();
  });
}

// 🟣 BUILD UI
function build(){
  let archers = [...new Set(season.flatMap(e=>Object.keys(e.archers)))];

  archer.innerHTML = archers.map(a=>`<option>${a}</option>`).join("");
  tournament.innerHTML = season.map((e,i)=>`<option value="${i}">${e.tournament}</option>`).join("");

  archer.onchange = update;
  tournament.onchange = update;

  buildRoster();
  drawTeamChart();
  update();
}

// 🟣 UPDATE DASHBOARD
function update(){
  let name = archer.value;

  let scores=[], tensArr=[], labels=[];

  season.forEach(e=>{
    if(e.archers[name]){
      scores.push(e.archers[name].score);
      tensArr.push(e.archers[name].tens);
      labels.push(e.tournament);
    }
  });

  if(!scores.length) return;

  pr.innerText = Math.max(...scores);
  avg.innerText = Math.round(scores.reduce((a,b)=>a+b)/scores.length);

  let totalTens = tensArr.reduce((a,b)=>a+b,0);
  document.getElementById("tens").innerText = totalTens;

  drawArcherChart(labels, scores, tensArr);
  drawTeamStats();
  drawInsights(scores);
}

// 🟣 ARCHER CHART
function drawArcherChart(labels, scores, tens){
  if(window.aChart) aChart.destroy();

  aChart = new Chart(archerChart,{
    data:{
      labels,
      datasets:[
        {type:'line', label:'Score', data:scores, borderWidth:3},
        {type:'bar', label:'10s', data:tens, yAxisID:'y1'}
      ]
    },
    options:{
      scales:{
        y:{position:'left'},
        y1:{position:'right', grid:{drawOnChartArea:false}}
      }
    }
  });
}

// 🟣 TEAM CHART
function drawTeamChart(){
  if(window.tChart) tChart.destroy();

  let labels = season.map(e=>e.tournament);
  let scores = season.map(e=>e.teamScore);

  tChart = new Chart(teamChart,{
    type:'line',
    data:{labels,datasets:[{label:'Team Score',data:scores,borderWidth:3}]}
  });
}

// 🟣 TEAM STATS
function drawTeamStats(){
  let e = season[tournament.value];
  if(!e) return;

  let avgScore = Math.round(
    Object.values(e.archers).reduce((a,b)=>a+b.score,0) /
    Object.keys(e.archers).length
  );

  teamStats.innerHTML = `
    Score: ${e.teamScore}<br>
    Average: ${avgScore}
  `;
}

// 🟣 ROSTER
function buildRoster(){
  let stats={};

  season.forEach(e=>{
    Object.entries(e.archers).forEach(([n,o])=>{
      if(!stats[n]) stats[n]=[];
      stats[n].push(o);
    });
  });

  let rows=Object.entries(stats).map(([n,a])=>{
    let scores=a.map(x=>x.score);
    let avg=Math.round(scores.reduce((x,y)=>x+y)/scores.length);
    let pr=Math.max(...scores);
    let tens=a.reduce((x,y)=>x+y.tens,0);

    let variance=scores.reduce((x,y)=>x+(y-avg)**2,0)/scores.length;

    return {
      n,avg,pr,tens,
      consistency:Math.round(100-variance),
      gender:a[0].gender
    };
  }).sort((a,b)=>b.avg-a.avg);

  roster.innerHTML = `
  <tr>
    <th>Name</th><th>Avg</th><th>PR</th><th>10s</th><th>Consistency</th>
  </tr>
  ` + rows.map(r=>`
  <tr>
    <td class="${r.gender=='M'?'male':'female'}">${r.n}</td>
    <td>${r.avg}</td>
    <td>${r.pr}</td>
    <td>${r.tens}</td>
    <td>${r.consistency}</td>
  </tr>`).join("");
}

// 🟣 INSIGHTS
function drawInsights(scores){
  let txt="";

  if(scores.length>1){
    let diff=scores.at(-1)-scores.at(-2);
    if(diff>15) txt+="🚀 Big Improvement<br>";
    if(diff<-20) txt+="⚠️ Major Drop<br>";
  }

  insight.innerHTML = txt;
}

// 🔥 START APP
loadData();

</script>

</body>
</html>
