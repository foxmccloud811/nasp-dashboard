<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{background:#0a0a0a;color:white;font-family:Arial;margin:0;}
.container{padding:12px;max-width:1100px;margin:auto;}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}

.card{background:#111;padding:14px;border-radius:12px;margin-bottom:12px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:800px){.grid{grid-template-columns:1fr 1fr;}}

button{padding:8px 12px;background:#6A0DAD;color:white;border:none;border-radius:8px;}
textarea{width:100%;height:100px;margin-bottom:10px;}

.male{color:#4da6ff;}
.female{color:#ff66cc;}

table{width:100%;border-collapse:collapse;}
td,th{padding:8px;border-bottom:1px solid #333;text-align:left;}

th{
color:#aaa;
cursor:pointer;
position:sticky;
top:0;
background:#111;
}

select{padding:6px;background:#000;color:white;border:1px solid #333;}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h2>🏹 NASP Elite Dashboard</h2>

<div>
<select id="teamSelect"></select>
<button id="addTeamBtn" onclick="createTeam()" style="display:none;">+ Team</button>
</div>
</div>

<div id="loginCard" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Coach Login</button>
</div>

<div id="adminPanel" style="display:none;">
<div class="card">
<textarea id="input" placeholder="Paste NASP page"></textarea>
<button onclick="process()">ADD TO SEASON</button>
<button onclick="resetSeason()">RESET</button>
</div>
</div>

<div class="grid">

<div class="card">
<h3>Archer</h3>
<select id="archer"></select>
<canvas id="archerChart"></canvas>
</div>

<div class="card">
<h3>Team</h3>
<select id="tournament"></select>
<div id="teamStats"></div>
<canvas id="teamChart"></canvas>
</div>

<div class="card">
<h3>Top 12</h3>
<label><input type="radio" name="mode" value="season" checked onchange="buildTop12()"> Season</label>
<label><input type="radio" name="mode" value="event" onchange="buildTop12()"> Tournament</label>
<div id="top12"></div>
</div>

<div class="card">
<h3>Coach Insights</h3>
<div id="insight"></div>
</div>

</div>

<div class="card">
<h3>Roster</h3>
<table id="roster"></table>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDLWNHjzpzHr58sEX-hDxetQhWygTabXFs",
authDomain:"nasp-dashboard.firebaseapp.com",
projectId:"nasp-dashboard"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let season=[],currentTeam="default";
let sortKey="avg",sortDir=-1;

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>alert("Login failed"));
}

auth.onAuthStateChanged(user=>{
if(user){
loginCard.style.display="none";
adminPanel.style.display="block";
addTeamBtn.style.display="inline-block";
}
loadTeams();
});

// TEAM SYSTEM
function loadTeams(){
db.collection("teams").get().then(s=>{
let teams=[];
s.forEach(d=>teams.push(d.id));

if(!teams.includes("default")){
db.collection("teams").doc("default").set({});
teams.push("default");
}

teamSelect.innerHTML=teams.map(t=>`<option>${t}</option>`).join("");
teamSelect.value=currentTeam;

teamSelect.onchange=()=>{
currentTeam=teamSelect.value;
loadData();
};

loadData();
});
}

function createTeam(){
let name=prompt("Team name?");
if(!name) return;

db.collection("teams").doc(name).set({}).then(loadTeams);
}

// RESET
function resetSeason(){
db.collection("teams").doc(currentTeam).collection("season")
.get().then(s=>s.forEach(d=>d.ref.delete())).then(loadData);
}

// PROCESS
function process(){

let lines=input.value.split("\n");

let e={tournament:lines[0]||"Event",teamScore:0,teamTens:0,archers:{}};

lines.forEach(l=>{

if(l.includes("Team Score")){
e.teamScore=parseInt(l.match(/\d+/)?.[0]||0);
let t=l.match(/\((\d+)\)/);
e.teamTens=t?+t[1]:0;
}

if(/^\d{2,3}/.test(l)){
let p=l.replace("(T)","").split(/\s+/);
let gi=p.findIndex(x=>x=="M"||x=="F");

if(gi<3)return;

let name=p.slice(2,gi-1).join(" ").trim();
if(!name)return;

let score=parseInt(p[0]);
if(isNaN(score))return;

let tens=parseInt(p[1])||0;
let gender=p[gi];

e.archers[name]={score,tens,gender};
}
});

if(Object.keys(e.archers).length===0){
alert("Bad paste");
return;
}

db.collection("teams").doc(currentTeam).collection("season").add(e).then(loadData);
}

// LOAD
function loadData(){
db.collection("teams").doc(currentTeam).collection("season").get().then(s=>{
season=[];
s.forEach(d=>season.push(d.data()));
build();
});
}

// BUILD
function build(){

let archers=[...new Set(season.flatMap(e=>Object.keys(e.archers)))].sort();

archer.innerHTML=archers.map(a=>`<option>${a}</option>`).join("");
tournament.innerHTML=season.map((e,i)=>`<option value="${i}">${e.tournament}</option>`).join("");

archer.onchange=update;
tournament.onchange=()=>{
update();
buildRoster();
drawTeam();
buildTop12();
buildInsights();
};

update();
buildRoster();
drawTeam();
buildTop12();
buildInsights();
}

// ⭐ ARCHER CHART (PR FIX HERE)
function update(){

let name=archer.value;
let scores=[],tens=[],labels=[];

season.forEach(e=>{
if(e.archers[name]){
scores.push(e.archers[name].score);
tens.push(e.archers[name].tens);
labels.push(e.tournament);
}
});

if(!scores.length)return;

let pr=Math.max(...scores);

if(window.aChart)aChart.destroy();

aChart=new Chart(archerChart,{
data:{
labels,
datasets:[
{
type:'line',
label:'Score',
data:scores,
borderColor:'#6A0DAD',

// ⭐ GOLD PR DOT
pointBackgroundColor:scores.map(s=>s===pr?'gold':'#6A0DAD'),
pointRadius:scores.map(s=>s===pr?6:3),
pointBorderWidth:scores.map(s=>s===pr?3:1),
pointBorderColor:scores.map(s=>s===pr?'gold':'#6A0DAD'),

tension:0.3
},
{
type:'bar',
label:'10s',
data:tens,
backgroundColor:'white',
yAxisID:'y1'
}
]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
y:{ticks:{color:'white'}},
y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'white'}}
}
}
});
}

// TEAM
function drawTeam(){

if(window.tChart)tChart.destroy();

tChart=new Chart(teamChart,{
type:'line',
data:{
labels:season.map(e=>e.tournament),
datasets:[{label:'Team Score',data:season.map(e=>e.teamScore),borderColor:'#6A0DAD'}]
}
});

let e=season[tournament.value];
teamStats.innerHTML=e?`Score ${e.teamScore} | 10s ${e.teamTens}`:"";
}

// TOP 12
function buildTop12(){
let mode=document.querySelector('input[name="mode"]:checked').value;
let list=[];

if(mode==="season"){
let stats={};
season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o.score);
});
});
list=Object.entries(stats).map(([n,s])=>({name:n,val:Math.round(s.reduce((a,b)=>a+b)/s.length)}));
}else{
let e=season[tournament.value];
if(!e)return;
list=Object.entries(e.archers).map(([n,o])=>({name:n,val:o.score}));
}

list.sort((a,b)=>b.val-a.val);
top12.innerHTML=list.slice(0,12).map((x,i)=>`${i+1}. ${x.name} - ${x.val}`).join("<br>");
}

// INSIGHTS
function buildInsights(){
if(!season.length)return;
let avg=Math.round(Object.values(season.at(-1).archers).reduce((a,b)=>a+b.score,0)/Object.keys(season.at(-1).archers).length);
insight.innerHTML=avg>250?"🔥 Elite":"💪 Improving";
}

// ROSTER (unchanged stable version)
function buildRoster(){
let sel=season[tournament.value];

let stats={},tensMap={},genderMap={};

season.forEach(e=>{
Object.entries(e.archers).forEach(([n,o])=>{
if(!stats[n])stats[n]=[];
stats[n].push(o.score);

if(!tensMap[n])tensMap[n]=0;
tensMap[n]+=o.tens||0;

if(!genderMap[n])genderMap[n]=o.gender;
});
});

let rows=Object.entries(stats).map(([n,s])=>{
let avg=Math.round(s.reduce((a,b)=>a+b)/s.length);
let pr=Math.max(...s);
let cur=sel?.archers[n]?.score||0;
let tens=tensMap[n];

let variance=s.reduce((a,b)=>a+(b-avg)**2,0)/s.length;
let cons=Math.min(10,Math.round(variance/50));

return {n,avg,pr,cur,tens,cons,gender:genderMap[n]};
});

rows.sort((a,b)=>(b[sortKey]-a[sortKey])*sortDir);

roster.innerHTML=`
<tr>
<th onclick="setSort('n')">Name</th>
<th onclick="setSort('cur')">${sel?.tournament||'Score'}</th>
<th onclick="setSort('avg')">Avg</th>
<th onclick="setSort('pr')">PR</th>
<th onclick="setSort('tens')">10s</th>
<th onclick="setSort('cons')">Consistency</th>
</tr>
`;

rows.forEach(r=>{
roster.innerHTML+=`
<tr>
<td class="${r.gender==='M'?'male':'female'}">${r.n}</td>
<td>${r.cur||"-"}</td>
<td>${r.avg}</td>
<td>${r.pr}</td>
<td>${r.tens}</td>
<td>${r.cons}</td>
</tr>`;
});
}

function setSort(k){
if(sortKey===k) sortDir*=-1;
else{sortKey=k;sortDir=-1;}
buildRoster();
}

// START
loadTeams();

</script>

</body>
</html>
