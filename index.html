<!DOCTYPE html>
<html>
<head>
  <title>NASP Coach App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial;
      padding: 12px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      background: #6A0DAD;
      color: white;
      border: none;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .card {
      background: #111;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .big {
      font-size: 28px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    td {
      padding: 6px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>

<body>

<h2>🏹 NASP Coach Dashboard</h2>

<textarea id="input" placeholder="Paste NASP page here..."></textarea>
<button onclick="process()">PROCESS</button>

<select id="archerSelect"></select>

<div class="card">
  <div>PR Score</div>
  <div id="pr" class="big">--</div>
</div>

<div class="card">
  <div>Trend</div>
  <div id="trend">--</div>
</div>

<div class="card">
  <div>Team Score</div>
  <div id="team" class="big">--</div>
</div>

<div class="card">
  <div>AI Coach Insight</div>
  <div id="insight">--</div>
</div>

<div class="card">
  <div>Roster</div>
  <table id="roster"></table>
</div>

<script>
let data = {};

function process() {
  const lines = document.getElementById("input").value.split("\n");

  data = {};
  let teamScore = 0;

  lines.forEach(line => {
    if (line.includes("Team Score")) {
      teamScore = parseInt(line.match(/\d+/)[0]);
    }

    if (/^\d{2,3}/.test(line)) {
      let parts = line.trim().split(/\s+/);

      let name = parts[2] + " " + parts[3];
      let score = parseInt(parts[0]);

      if (!data[name]) data[name] = [];
      data[name].push(score);
    }
  });

  document.getElementById("team").textContent = teamScore;

  buildDropdown();
  buildRoster();
  updateView();
}

function buildDropdown() {
  const select = document.getElementById("archerSelect");
  select.innerHTML = "";

  Object.keys(data).forEach(name => {
    let opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });

  select.onchange = updateView;
}

function updateView() {
  const name = document.getElementById("archerSelect").value;
  const scores = data[name] || [];

  if (scores.length === 0) return;

  let pr = Math.max(...scores);
  document.getElementById("pr").textContent = pr;

  if (scores.length >= 2) {
    let diff = scores[scores.length-1] - scores[scores.length-2];
    document.getElementById("trend").textContent =
      diff > 0 ? "⬆ Improving" :
      diff < 0 ? "⬇ Dropping" : "➡ Steady";
  }

  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  let insight = "";
  if (avg > 260) insight = "🔥 State-level shooter";
  else if (avg > 240) insight = "💪 Strong varsity";
  else insight = "🎯 Developing";

  document.getElementById("insight").textContent = insight;
}

function buildRoster() {
  let table = document.getElementById("roster");
  table.innerHTML = "";

  let entries = Object.entries(data).map(([name, scores]) => {
    let avg = scores.reduce((a,b)=>a+b,0)/scores.length;
    return {name, avg};
  });

  entries.sort((a,b)=>b.avg-a.avg);

  entries.forEach(e => {
    let row = document.createElement("tr");
    row.innerHTML = `<td>${e.name}</td><td>${e.avg.toFixed(1)}</td>`;
    table.appendChild(row);
  });
}
</script>

</body>
</html>
